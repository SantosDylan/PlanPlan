<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/plan-plan-mark.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Plan-Plan" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1b1a17" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="La programmation du cinéma La Scala (Thionville) — et chaque séance dans ton agenda en un clic."
    />
    <title>Plan-Plan — les séances du Scala dans ton agenda</title>
    <script>
      // Pre-paint theme resolution — mirrors resolveTheme() in src/lib/theme.ts.
      // Runs before the bundle so <html data-theme> is set before first paint (no flash).
      (function () {
        try {
          var stored = localStorage.getItem('planplan-theme');
          var pref = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var theme =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
